<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音助手</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand" aria-label="应用图标">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="应用图标">
            </div>

            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i>
                <span class="btn-copy">
                    <strong>新建对话</strong>
                    <small>创建新的本地会话</small>
                </span>
            </button>

            <div class="sidebar-section-title">最近对话</div>

            <div class="conversations-list" id="conversationsList">
                <!-- 对话列表将动态加载 -->
            </div>

            <div class="sidebar-footer">
                <div class="service-status-card">
                    <div class="service-status-title">服务状态</div>
                    <div class="service-status">
                        <div class="status-item">
                            <span class="status-dot" id="sensevoiceStatus"></span>
                            <span>SenseVoice</span>
                        </div>
                        <div class="status-item">
                            <span class="status-dot" id="llamacppStatus"></span>
                            <span>llama.cpp</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>

                <div class="header-title-group">
                    <span class="header-kicker">WEB INTERFACE</span>
                    <h1 class="current-conversation-title" id="currentTitle">新对话</h1>
                </div>

                <div class="header-actions">
                    <span class="header-chip">Local-First</span>
                    <button class="clear-btn" id="clearBtn" title="清空所有对话">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen"></div>

                <div class="messages-container" id="messagesContainer">
                    <!-- 消息将动态加载 -->
                </div>
            </div>

            <div class="input-container">
                <div class="edit-indicator" id="editIndicator">
                    <div class="edit-indicator-copy">
                        <i class="fas fa-pen"></i>
                        <span id="editIndicatorText">正在编辑消息</span>
                    </div>
                    <button class="edit-cancel-btn" id="editCancelBtn" title="取消编辑">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="input-wrapper">
                    <textarea
                        class="message-input"
                        id="messageInput"
                        placeholder="输入消息，或点击麦克风开始语音输入..."
                        rows="1"
                    ></textarea>
                    <div class="input-actions">
                        <button class="voice-btn" id="voiceBtn" title="语音输入">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button class="send-btn" id="sendBtn" title="发送">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <div class="recording-indicator" id="recordingIndicator">
                    <div class="recording-animation">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="recording-text">正在录音...</span>
                    <span class="recording-time" id="recordingTime">00:00</span>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
